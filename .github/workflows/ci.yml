name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Weekly re-scan: a dependency that was clean at merge time can become
  # vulnerable later with no code change. govulncheck and the race suite run
  # on this schedule even without a PR.
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to format these files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # Pull the wakil-dev sandbox image from Docker Hub so the Docker-
      # dependent integration tests (internal/exec/live_docker_test.go)
      # can run in CI. Retag as wakil-dev:latest to match what the test
      # code expects. Skip gracefully if the pull fails — the tests
      # self-skip when the image is unavailable.
      - name: pull sandbox image
        run: |
          docker pull valonmamu/wakil-dev:latest \
            && docker tag valonmamu/wakil-dev:latest wakil-dev:latest \
            || echo "⚠ wakil-dev image pull failed — Docker integration tests will skip"

      - name: test (with coverage)
        run: |
          set -euo pipefail
          go test -count=1 -cover ./... | tee cover.txt

      - name: coverage floors (agent/tools/exec/proxy)
        run: scripts/check_coverage.sh cover.txt

      - name: coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: cover.txt
          retention-days: 14

      # Full-repo race: measured ~40s on this codebase (2026-07-19), so the
      # former 4-package scope was widened.
      - name: race detector
        run: go test -race -count=1 ./...

      # Vulnerability scan — reports known Go vulnerabilities in code reachable
      # from this module (symbol-level analysis, not "any CVE in any dep").
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.10.0
