name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to format these files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (with coverage)
        run: go test -count=1 -cover ./... | tee cover.txt

      - name: coverage floors (agent/tools/exec/proxy)
        run: scripts/check_coverage.sh cover.txt

      - name: coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.txt
          retention-days: 14

      # Full-repo race: measured ~40s on this codebase (2026-07-19), so the
      # former 4-package scope was widened.
      - name: race detector
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.0
